<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projobb AI Chat</title>
  <meta name="description" content="Projobbers full-screen AI Assistant, designed to help with career guidance, skill evaluation, and mentorship."/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="ai-chat.css"/>
</head>
<body class="ai-chat-body">

  <div class="chat-app-container">
    
    <!-- Sidebar -->
    <aside class="chat-sidebar" id="chat-sidebar">
      <div class="sidebar-header">
        <button id="new-chat-btn" class="new-chat-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New chat
        </button>
        <button id="close-sidebar-btn" class="icon-btn mobile-only" title="Close Sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="history-list" id="chat-history-list">
        <!-- History items generated by JS -->
        <div class="history-group">
          <div class="history-label">Recent</div>
          <button class="history-item active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="history-title">Career roadmap advice</span>
          </button>
        </div>
      </div>

      <div class="sidebar-footer">
        <a href="index.html" class="back-home-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
          Back to Projobbers
        </a>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      
      <!-- Top header (Mobile Nav & Options) -->
      <header class="chat-top-header">
        <div class="header-left">
          <button id="toggle-sidebar-btn" class="icon-btn" title="Toggle Sidebar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <span class="model-name">Projobb AI <span class="badge">GPT-4o</span></span>
        </div>
        
        <div class="header-right">
          <select id="chat-lang-select" class="lang-select">
            <option value="en">🇬🇧 EN</option>
            <option value="ta">🇮🇳 TA</option>
            <option value="te">🇮🇳 TE</option>
          </select>
          <button id="chat-mute-btn" class="icon-btn" title="Toggle Voice">
            <svg id="mute-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <svg id="mute-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Scrollable Messages -->
      <div class="chat-scroll-area" id="chat-scroll-area">
        <div class="messages-container" id="messages-container">
          <!-- Initial welcome -->
          <div class="empty-state" id="empty-state">
            <div class="empty-logo">
              <img src="logo.jpg" alt="Projobb AI" onerror="this.src='https://via.placeholder.com/64'">
            </div>
            <h2>How can I help you today?</h2>
            <div class="suggestion-cards" id="suggestion-cards">
              <!-- JS will populate -->
            </div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="chat-input-container">
        <div class="chat-input-box">
          
          <button id="chat-voice-btn" class="icon-btn voice-btn" title="Voice Input">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
             </svg>
          </button>
          
          <textarea id="chat-user-input" rows="1" placeholder="Message Projobb AI..." autocomplete="off"></textarea>
          
          <button id="chat-send-btn" class="icon-btn send-btn" title="Send message" disabled>
             <svg width="20" height="20" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" fill="white" stroke="none"/>
             </svg>
          </button>
          
        </div>
        <div class="chat-footer-text">
          Projobb AI can make mistakes. Consider verifying important information.
        </div>
      </div>
      
    </main>

  </div>

  <script src="mock-responses.js"></script>
  <script src="api-client.js"></script>
  <script src="ai-chat.js"></script>
</body>
</html>
